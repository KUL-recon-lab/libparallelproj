[workspace]
name = "libparallelproj"
channels = ["conda-forge"]
platforms = [
    "linux-64",
    "win-64",
    "osx-64",
    "osx-arm64",
    # CUDA-tagged platforms (pixi "rich platforms", >= 0.71): distinct platform
    # identities that advertise a CUDA driver via the __cuda virtual package.
    # They replace the deprecated per-feature [feature.cudaX.system-requirements]
    # cuda = "..." and are referenced by name from the cuda12 / cuda13 features.
    { name = "linux-64-cuda12", platform = "linux-64", cuda = "12" },
    { name = "win-64-cuda12", platform = "win-64", cuda = "12" },
    { name = "linux-64-cuda13", platform = "linux-64", cuda = "13" },
    { name = "win-64-cuda13", platform = "win-64", cuda = "13" },
]

# ── Default feature: build infrastructure + true runtime deps ──────────────
# cmake/ninja  — build tools   (conda: build)
# python/nanobind — host deps  (conda: host), linked against when compiling
# numpy/array-api-compat — runtime deps the installed library actually needs
[dependencies]
cmake            = ">=3.18"
ninja            = "*"
python           = ">=3.12,<4"
nanobind         = "*"
numpy            = "*"
array-api-compat = "*"

# conda-forge's cxx-compiler on Windows sets these in its activation scripts
# for use with the Visual Studio generator. Ninja rejects both — it supports
# neither platform nor toolset specification. Clearing them here overrides the
# activation-script values for every environment.
[activation.env]
CMAKE_GENERATOR_PLATFORM = ""
CMAKE_GENERATOR_TOOLSET  = ""

# ── workspace-level tasks (available in every environment) ─────────────────
[tasks]
# create a validated release tag (v<VERSION>) from the VERSION file;
# refuses on dev versions, dirty tree, missing changelog entry, existing tag
tag-release = "python scripts/tag_release.py"

# ── test feature ───────────────────────────────────────────────────────────
# Pure test deps — not needed to build or run the library itself.
# pytorch resolves to the CPU build in the default env; in cuda12/cuda13 envs
# the solver picks the CUDA-enabled build automatically via the CUDA-tagged
# platforms those features are pinned to.
# pytest-cov is used in CI to generate Python coverage reports.
[feature.test.dependencies]
pytest           = "*"
pytest-cov       = "*"
array-api-strict = "*"
pytorch          = "*"

# ── cpu feature ────────────────────────────────────────────────────────────
# Restrict the CPU environment to the plain OS/arch platforms. Without this the
# cpu/default environment would inherit *all* workspace platforms -- now
# including the CUDA-tagged linux-64-cuda* / win-64-cuda* identities -- and try
# to solve them (which requires a CUDA driver). The CUDA environments select the
# tagged platforms via the cuda12 / cuda13 features instead.
[feature.cpu]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]

# build tool (conda: build)
[feature.cpu.dependencies]
cxx-compiler = "*"

# host dep (conda: host + run) — macOS system clang has no OpenMP; must be
# explicit. Linux/Windows get OpenMP from the compiler package itself.
[feature.cpu.target.osx-64.dependencies]
llvm-openmp = "*"

[feature.cpu.target.osx-arm64.dependencies]
llvm-openmp = "*"

# lcov is Linux-only; used in CI to collect C++ coverage after a coverage build
[feature.cpu.target.linux-64.dependencies]
lcov = "*"

[feature.cpu.tasks]
configure          = "cmake --preset non-cuda"
# configure-coverage adds --coverage flags; used only in CI on Linux
configure-coverage = "cmake --preset non-cuda -DCMAKE_CXX_FLAGS=--coverage -DCMAKE_C_FLAGS=--coverage"
build              = "cmake --build build"
test-cpp           = "ctest --output-on-failure --test-dir build"
test-python        = {cmd = "pytest -v tests", env = {PYTHONPATH = "build"}}
test-python-cov    = {cmd = "pytest --cov=parallelproj_core --cov-report=xml:coverage_python.xml --cov-report=term tests", env = {PYTHONPATH = "build"}}
test               = {depends-on = ["test-cpp", "test-python"]}
collect-coverage-cpp = "lcov --capture --directory build --output-file coverage_cpp.info && lcov --remove coverage_cpp.info '/usr/*' '*/tests/*' --output-file coverage_cpp_filtered.info && lcov --list coverage_cpp_filtered.info"
install            = "cmake --install build"
uninstall          = "cmake --build build --target uninstall"

# ── cuda12 feature ─────────────────────────────────────────────────────────
[feature.cuda12]
platforms = ["linux-64-cuda12", "win-64-cuda12"]

# build tools (conda: build): cxx-compiler + nvcc
# host dep   (conda: host):   cuda-cudart-dev — CUDA runtime headers + link stubs
# cupy       (test/runtime):  GPU array backend for testing on real hardware
[feature.cuda12.dependencies]
cxx-compiler    = "*"
cuda-compiler   = ">=12,<13"
cuda-cudart-dev = "*"
cupy            = "*"

# On Windows the CUDA installer sets a system-wide CUDA_PATH (e.g. 12.4) that
# takes precedence over the conda env's CUDA toolkit. Override it here so that
# CuPy's NVRTC uses the conda-managed CUDA headers instead of the system ones.
[feature.cuda12.target.win-64.activation.env]
CUDA_PATH = "$CONDA_PREFIX/Library"

[feature.cuda12.tasks]
configure   = "cmake --preset cuda12"
build       = "cmake --build build-cuda12"
test-cpp    = "ctest --output-on-failure --test-dir build-cuda12"
test-python = {cmd = "pytest -v tests", env = {PYTHONPATH = "build-cuda12"}}
test        = {depends-on = ["test-cpp", "test-python"]}
install     = "cmake --install build-cuda12"

# ── cuda13 feature ─────────────────────────────────────────────────────────
[feature.cuda13]
platforms = ["linux-64-cuda13", "win-64-cuda13"]

[feature.cuda13.dependencies]
cxx-compiler    = "*"
cuda-compiler   = ">=13,<14"
cuda-cudart-dev = "*"
cupy            = "*"

[feature.cuda13.target.win-64.activation.env]
CUDA_PATH = "$CONDA_PREFIX/Library"

[feature.cuda13.tasks]
configure   = "cmake --preset cuda13"
build       = "cmake --build build-cuda13"
test-cpp    = "ctest --output-on-failure --test-dir build-cuda13"
test-python = {cmd = "pytest -v tests", env = {PYTHONPATH = "build-cuda13"}}
test        = {depends-on = ["test-cpp", "test-python"]}
install     = "cmake --install build-cuda13"

# ── docs feature ───────────────────────────────────────────────────────────
[feature.docs]
platforms = ["linux-64", "osx-64", "osx-arm64"]

# build tool + host deps for building the library (needed for Sphinx auto-examples)
[feature.docs.dependencies]
cxx-compiler         = "*"
doxygen              = "*"
graphviz             = "*"
sphinx               = ">=8,<9"
breathe              = ">=4,<5"
sphinx-gallery       = "*"
sphinx-design        = "*"
furo                 = "*"
sphinxcontrib-bibtex = "*"
matplotlib           = "*"
pytorch              = ">=2,<3"

[feature.docs.target.osx-64.dependencies]
llvm-openmp = "*"

[feature.docs.target.osx-arm64.dependencies]
llvm-openmp = "*"

[feature.docs.tasks]
configure-docs   = "cmake --preset docs"
build-doxygen    = {cmd = "cmake --build docs/_build_doxygen --target doxygen-docs", depends-on = ["configure-docs"]}
# Full cmake build (library + parallelproj_core) without running sphinx.
# Used by RTD so sphinx-build can be invoked directly into $READTHEDOCS_OUTPUT.
build-for-sphinx = {cmd = "cmake --build docs/_build_doxygen", depends-on = ["build-doxygen"]}
build-docs       = {cmd = "cd docs && make html", depends-on = ["build-doxygen"]}

# ── Environments ───────────────────────────────────────────────────────────
[environments]
default = {features = ["cpu", "test"]}
cuda12  = {features = ["cuda12", "test"]}
cuda13  = {features = ["cuda13", "test"]}
docs    = {features = ["docs"]}
