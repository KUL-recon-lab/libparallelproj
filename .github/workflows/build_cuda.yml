name: Build CUDA

on:
  push:
    branches:
      - main
    paths:
      - 'src/*_worker.h'
      - 'src/*.cu'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - '.github/workflows/build_cuda.yml'
  pull_request:
    paths:
      - 'src/*_worker.h'
      - 'src/*.cu'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - '.github/workflows/build_cuda.yml'

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    env:
      BUILD_DIR: build

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        python:
          - "3.12"
          #- "3.x"   # means: latest available 3.* from conda-forge

    steps:
      # Step 0: Setup MSVC Developer Command Prompt for Windows
      # without that step we don't have access no the Ninja generator
      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Micromamba
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment_cuda_build_only.yml
          micromamba-version: latest
          init-shell: bash
          post-cleanup: all
          create-args: >-
            ${{ matrix.python == '3.x' && 'python>=3,<4' || format('python={0}', matrix.python) }}
            pip

      # Step 2b: Show python version for debugging purposes
      - name: Show python version
        shell: bash -l {0}
        run: |
          micromamba activate libparallelproj_cuda_build_only
          python -V

      # Step 3: Configure and Build with CMake and Ninja
      - name: Configure and Build
        shell: bash -el {0}
        run: |
          micromamba activate libparallelproj_cuda_build_only
          cmake --preset cuda -B $BUILD_DIR
          cmake --build $BUILD_DIR

      # Step 4: Run python tests (should be skipped if no physical GPU is available)
      - name: Run python tests
        shell: bash -el {0}
        run: |
          micromamba activate libparallelproj_cuda_build_only
          pytest -v tests

      # Step 5: Install
      - name: Install
        shell: bash -el {0}
        run: |
          micromamba activate libparallelproj_cuda_build_only
          cmake --install $BUILD_DIR

      # Step 6: Uninstall
      - name: Uninstall
        shell: bash -el {0}
        run: |
          micromamba activate libparallelproj_cuda_build_only
          cmake --build $BUILD_DIR --target uninstall
