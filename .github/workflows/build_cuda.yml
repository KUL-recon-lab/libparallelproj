name: Build CUDA

on:
  push:
    branches: [main]
    paths:
      - 'src/*_worker.h'
      - 'src/*.cu'
      - 'tests/*.cu'
      - 'tests/*.cpp'
      - 'tests/*.py'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - 'pixi.toml'
      - 'pixi.lock'
      - '.github/workflows/build_cuda.yml'
  pull_request:
    paths:
      - 'src/*_worker.h'
      - 'src/*.cu'
      - 'tests/*.cu'
      - 'tests/*.cpp'
      - 'tests/*.py'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - 'pixi.toml'
      - 'pixi.lock'
      - '.github/workflows/build_cuda.yml'

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    # CONDA_OVERRIDE_CUDA tells the pixi solver to treat CUDA as available even
    # on runners without a physical GPU or CUDA driver installed.
    env:
      CONDA_OVERRIDE_CUDA: ${{ matrix.cuda-version }}
    strategy:
      fail-fast: true
      matrix:
        # Explicit include list — cleaner than a cross-product + exclude when
        # only 3 of 4 combinations are valid.
        include:
          - os: ubuntu-latest
            pixi-env: cuda12
            cuda-version: "12.0"
          - os: ubuntu-latest
            pixi-env: cuda13
            cuda-version: "13.0"
          - os: windows-latest
            pixi-env: cuda13
            cuda-version: "13.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          environments: ${{ matrix.pixi-env }}
          cache: true

      - name: Show compiler and CUDA versions
        run: |
          pixi run -e ${{ matrix.pixi-env }} python -V
          pixi run -e ${{ matrix.pixi-env }} nvcc --version

      - name: Configure
        run: pixi run -e ${{ matrix.pixi-env }} configure

      - name: Build
        run: pixi run -e ${{ matrix.pixi-env }} build

      # C++ CUDA tests require a physical GPU; CI runners have none so we only
      # run the Python test suite (conftest.py skips all tests when cuda_enabled
      # but no device is detected).
      - name: Run Python tests
        run: pixi run -e ${{ matrix.pixi-env }} test-python

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cuda-build-${{ runner.os }}-${{ matrix.pixi-env }}
          path: build-${{ matrix.pixi-env }}/**
          if-no-files-found: warn
