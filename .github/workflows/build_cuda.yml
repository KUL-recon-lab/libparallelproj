name: Build CUDA

on:
  push:
    branches: [main]
    paths:
      - 'src/*_worker.h'
      - 'src/*.cu'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - '.github/workflows/build_cuda.yml'
  pull_request:
    paths:
      - 'src/*_worker.h'
      - 'src/*.cu'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - '.github/workflows/build_cuda.yml'

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash -l {0}
            cmake_extra: ""
          - os: windows-latest
            shell: pwsh
            cmake_extra: >
              -DCMAKE_C_COMPILER=cl
              -DCMAKE_CXX_COMPILER=cl
              -DCMAKE_CUDA_HOST_COMPILER=cl

    env:
      ENV_NAME: libparallelproj_cuda_build_only
      BUILD_DIR: build
      CMAKE_GEN: Ninja

    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment_cuda_build_only.yml
          micromamba-version: latest
          init-shell: bash powershell
          post-cleanup: all
          create-args: >-
            python=3.12
            pip

      # Needed on Windows so nvcc can find cl.exe
      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Debug toolchain
        shell: ${{ matrix.shell }}
        run: |
          micromamba run -n ${{ env.ENV_NAME }} -- python -V
          micromamba run -n ${{ env.ENV_NAME }} -- nvcc --version
          micromamba run -n ${{ env.ENV_NAME }} -- nvcc --list-gpu-arch

      - name: Configure
        shell: ${{ matrix.shell }}
        run: |
          micromamba run -n ${{ env.ENV_NAME }} -- cmake --preset cuda -B ${{ env.BUILD_DIR }} -G ${{ env.CMAKE_GEN }} ${{ matrix.cmake_extra }}

      - name: Build
        shell: ${{ matrix.shell }}
        run: |
          micromamba run -n ${{ env.ENV_NAME }} -- cmake --build ${{ env.BUILD_DIR }} --config Release

      - name: Test
        shell: ${{ matrix.shell }}
        env:
          PYTHONPATH: ${{ env.BUILD_DIR }}
        run: |
          micromamba run -n ${{ env.ENV_NAME }} -- pytest -v tests

      - name: Install
        shell: ${{ matrix.shell }}
        run: |
          micromamba run -n ${{ env.ENV_NAME }} -- cmake --install ${{ env.BUILD_DIR }} --config Release

      - name: Uninstall
        shell: ${{ matrix.shell }}
        run: |
          micromamba run -n ${{ env.ENV_NAME }} -- cmake --build ${{ env.BUILD_DIR }} --target uninstall --config Release
