name: Build CUDA

on:
  push:
    branches: [main]
    paths:
      - 'src/*_worker.h'
      - 'src/*.cu'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - '.github/workflows/build_cuda.yml'
  pull_request:
    paths:
      - 'src/*_worker.h'
      - 'src/*.cu'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - '.github/workflows/build_cuda.yml'

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]

    env:
      ENV_NAME: libparallelproj_cuda_build_only
      BUILD_DIR: build

    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment_cuda_build_only.yml
          micromamba-version: latest
          # no need for init-shell if we only use "micromamba run"
          post-cleanup: all
          create-args: >-
            python=3.12
            pip

      # Windows only: nvcc needs MSVC cl.exe available
      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Debug toolchain
        run: |
          micromamba run -n ${{ env.ENV_NAME }} python -V
          micromamba run -n ${{ env.ENV_NAME }} nvcc --version
          micromamba run -n ${{ env.ENV_NAME }} nvcc --list-gpu-arch

      # Configure Linux
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          micromamba run -n ${{ env.ENV_NAME }} cmake --preset cuda -B ${{ env.BUILD_DIR }}

      # Configure Windows (force MSVC host compiler for nvcc)
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          micromamba run -n ${{ env.ENV_NAME }} cmake --preset cuda -B ${{ env.BUILD_DIR }} -G Ninja ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_CUDA_HOST_COMPILER=cl
        shell: cmd

      - name: Build
        run: |
          micromamba run -n ${{ env.ENV_NAME }} cmake --build ${{ env.BUILD_DIR }} --config Release

      - name: Test
        env:
          PYTHONPATH: ${{ env.BUILD_DIR }}
        run: |
          micromamba run -n ${{ env.ENV_NAME }} pytest -v tests

      - name: Install
        run: |
          micromamba run -n ${{ env.ENV_NAME }} cmake --install ${{ env.BUILD_DIR }} --config Release

      - name: Uninstall
        run: |
          micromamba run -n ${{ env.ENV_NAME }} cmake --build ${{ env.BUILD_DIR }} --target uninstall --config Release
