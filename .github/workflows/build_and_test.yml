name: Build and Test

on:
  push:
    branches:
      - main
    paths:
      - 'src/*_worker.h'
      - 'src/*.cpp'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - '.github/workflows/build_and_test.yml'
  pull_request:
    paths:
      - 'src/*_worker.h'
      - 'src/*.cpp'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - '.github/workflows/build_and_test.yml'

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python:
          - "3.12"
          - "3.x"   # means: latest available 3.* from conda-forge

    steps:
      # Step 0: Setup MSVC Developer Command Prompt for Windows
      # without that step we don't have access no the Ninja generator
      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Micromamba
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          micromamba-version: latest
          init-shell: bash
          post-cleanup: all
          create-args: >-
            ${{ matrix.python == '3.x' && 'python>=3,<4' || format('python={0}', matrix.python) }}
            pip

      # Step 2b: Show python version for debugging purposes
      - name: Show python version
        shell: bash -l {0}
        run: python -V

      # Step 3: Configure and Build with CMake and Ninja
      - name: Configure and Build
        shell: bash -el {0}
        run: |
          micromamba activate libparallelproj
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX -DBUILD_PYTHON=ON -DBUILD_TESTS=ON
          cmake --build .

      # Step 4: Run Tests
      - name: Run Tests
        shell: bash -el {0}
        run: |
          micromamba activate libparallelproj
          cd build
          ctest --output-on-failure

      # Step 5: Install
      - name: Install
        shell: bash -el {0}
        run: |
          micromamba activate libparallelproj
          cd build
          cmake --install .

      # Step 6: Uninstall
      - name: Uninstall
        shell: bash -el {0}
        run: |
          micromamba activate libparallelproj
          cd build
          cmake --build . --target uninstall
