name: Build and Test

on:
  push:
    branches: [main]
    paths:
      - 'src/*_worker.h'
      - 'src/*.cpp'
      - 'tests/*.cpp'
      - 'tests/*.py'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - 'pixi.toml'
      - 'pixi.lock'
      - '.github/workflows/build_and_test.yml'
  pull_request:
    paths:
      - 'src/*_worker.h'
      - 'src/*.cpp'
      - 'tests/*.cpp'
      - 'tests/*.py'
      - 'python/bindings.cpp'
      - 'CMakeLists.txt'
      - 'pixi.toml'
      - 'pixi.lock'
      - '.github/workflows/build_and_test.yml'

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          environments: default
          cache: true

      # On Linux we add --coverage flags so gcov data is generated during tests.
      # On other platforms a plain configure is sufficient.
      - name: Configure (Linux, with coverage flags)
        if: runner.os == 'Linux'
        run: pixi run -e default configure-coverage

      - name: Configure (Windows / macOS)
        if: runner.os != 'Linux'
        run: pixi run -e default configure

      - name: Build
        run: pixi run -e default build

      - name: Run C++ tests
        run: pixi run -e default test-cpp

      # On Linux run pytest with coverage reporting; elsewhere run it plain.
      - name: Run Python tests with coverage (Linux)
        if: runner.os == 'Linux'
        run: pixi run -e default test-python-cov

      - name: Run Python tests (Windows / macOS)
        if: runner.os != 'Linux'
        run: pixi run -e default test-python

      - name: Collect C++ coverage report (Linux)
        if: runner.os == 'Linux'
        run: pixi run -e default collect-coverage-cpp

      - name: Upload coverage to Codecov (Linux)
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage_cpp_filtered.info,./coverage_python.xml
          flags: unittests
          name: codecov-libparallelproj
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Install
        run: pixi run -e default install

      - name: Uninstall
        run: pixi run -e default uninstall

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ runner.os }}
          path: build/**
          if-no-files-found: warn
