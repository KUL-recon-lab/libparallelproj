version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "latest"

  jobs:
    # no post_checkout git hacks needed: the project version comes from the
    # VERSION file at the repo root, which is part of every checkout
    create_environment:
      # Install pixi via asdf (recommended RTD approach)
      - asdf plugin add pixi
      - asdf install pixi latest
      - asdf global pixi latest

    install:
      - pixi install -e docs

    build:
      html:
        # cmake configure → doxygen XML → full project build (produces parallelproj_core)
        - pixi run -e docs build-for-sphinx
        # sphinx-build writes directly into RTD's output directory;
        # conf.py uses __file__-anchored paths so CWD does not matter
        - pixi run -e docs sphinx-build -T -b html docs "$READTHEDOCS_OUTPUT/html"
